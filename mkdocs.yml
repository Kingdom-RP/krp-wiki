site_name: Kingdom RP wiki
site_description: Гайд по системам развития сервера Kingdom RP
site_url: https://kingdom-rp.github.io/krp-wiki/
site_author: Kingdom RP

theme:
  name: material
  language: ru
  custom_dir: overrides
  logo: assets/icons/icon_128x128.png
  favicon: assets/icons/icon_32x32.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

extra_javascript:
  - javascripts/clickable-title.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kingdom-RP

nav:
  - Главная: index.md
  - Быстрый старт: quickstart.md
  - Пути развития:
      - ⚔ Война: war.md
      - ⛏ Добыча: mining.md
      - 🌾 Промысел: harvest.md
      - 🔨 Ремесло: craft.md
      - ✨ Магия: magic.md
  - Глоссарий: glossary.md
  - FAQ: faq.md

plugins:
  - search:
      lang: ru
  - git-revision-date-localized:
      type: date
      locale: ru
      fallback_to_build_date: true
